services:
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
      args:
        - GIT_SHA=${GIT_SHA:-unknown}
    container_name: wiz3dtools-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-minicpm-v:8b}
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10485760}
      - SMTP_HOST=${SMTP_HOST:-smtp.mail.me.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - COMPANY_NAME=${COMPANY_NAME:-Wiz3D Prints}
      - COMPANY_EMAIL=${COMPANY_EMAIL}
      - COMPANY_PHONE=${COMPANY_PHONE}
      - COMPANY_ADDRESS=${COMPANY_ADDRESS}
      - COMPANY_WEBSITE=${COMPANY_WEBSITE}
      - PAYMENT_PAYPAL=${PAYMENT_PAYPAL}
      - PAYMENT_VENMO=${PAYMENT_VENMO}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://tools.wiz3dprints.com}
      - MCP_SERVICE_TOKEN=${MCP_SERVICE_TOKEN}
      # BUILDPLAN_6_PHASE_3 (2026-06-04): BAMBU_MONITOR_URL removed — backend
      # no longer proxies the bambu-monitor (service deleted). BAMBUDDY_URL +
      # BAMBUDDY_API_KEY remain on the backend for Phase 4's colors sync.
      - BAMBUDDY_URL=${BAMBUDDY_URL:-http://192.168.7.147:8000}
      - BAMBUDDY_API_KEY=${BAMBUDDY_API_KEY}
      - STORE_API_KEY=${STORE_API_KEY}
      - STORE_IMAGE_PUBLIC_BASE=${STORE_IMAGE_PUBLIC_BASE:-https://tools.wiz3dprints.com/uploads/store}
      # Change #148 F7 — per-customer signed tokens. Keep
      # ENABLE_STORE_CUSTOMER_TOKEN=false until wiz3d-prints' consumer
      # flow ships the token-fetch wiring; flip to true to enforce.
      - STORE_CUSTOMER_TOKEN_SECRET=${STORE_CUSTOMER_TOKEN_SECRET}
      - ENABLE_STORE_CUSTOMER_TOKEN=${ENABLE_STORE_CUSTOMER_TOKEN:-false}
      - MAX_IMAGE_SIZE=${MAX_IMAGE_SIZE:-5242880}
      # BuildPlan #11 Phase 1 — wholesale-user admin proxy. Token must
      # match `ADMIN_API_TOKEN` on the wiz3d-prints side.
      - WIZ3D_PRINTS_API_URL=${WIZ3D_PRINTS_API_URL:-http://192.168.7.245:3000}
      - WIZ3D_PRINTS_ADMIN_TOKEN=${WIZ3D_PRINTS_ADMIN_TOKEN}
      - REMBG_URL=http://rembg:7000
      # BP38 P7 — Zoo-Notifier push hub. Blank ZOO_NOTIFIER_KEY = silent
      # no-op (order/payment flow never breaks if the hub is un-provisioned).
      - ZOO_NOTIFIER_URL=${ZOO_NOTIFIER_URL:-http://192.168.7.84:3030}
      - ZOO_NOTIFIER_KEY=${ZOO_NOTIFIER_KEY}
    volumes:
      - ${UPLOADS_PATH:-./uploads}:/app/uploads
    networks:
      - wiz3dtools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - rembg

  rembg:
    image: danielgatis/rembg:latest
    container_name: wiz3dtools-rembg
    restart: unless-stopped
    command: ["s", "--host", "0.0.0.0", "--port", "7000", "--log_level", "warning"]
    volumes:
      - ${REMBG_MODELS_PATH:-./rembg-models}:/root/.u2net
    networks:
      - wiz3dtools

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - GIT_SHA=${GIT_SHA:-unknown}
    container_name: wiz3dtools-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ${UPLOADS_PATH:-./uploads}/store:/uploads/store:ro
    networks:
      - wiz3dtools
    depends_on:
      - backend

  # 2026-07-04 (Bug #97): wiz3dtools-mcp service (jarvis bridge, :8014)
  # removed entirely — it had been down and Wiz chose to retire it rather
  # than revive it. jarvis-ai dropped the client entry in its v1.6.3.

  # BuildPlan #6 Phase 3 (2026-06-04): wiz3dtools-bambu-monitor service
  # removed entirely. Phase 2 cut it over from MQTT to BamBuddy REST;
  # Phase 3 removes the dashboard + printer registry it fed — the
  # service has no remaining consumers.

networks:
  wiz3dtools:
    driver: bridge
