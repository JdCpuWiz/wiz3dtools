services:
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    container_name: wizqueue-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-minicpm-v:8b}
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10485760}
      - SMTP_HOST=${SMTP_HOST:-smtp.mail.me.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - COMPANY_NAME=${COMPANY_NAME:-Wiz3D Prints}
      - COMPANY_EMAIL=${COMPANY_EMAIL}
      - COMPANY_PHONE=${COMPANY_PHONE}
      - COMPANY_ADDRESS=${COMPANY_ADDRESS}
      - COMPANY_WEBSITE=${COMPANY_WEBSITE}
      - PAYMENT_PAYPAL=${PAYMENT_PAYPAL}
      - PAYMENT_VENMO=${PAYMENT_VENMO}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://tools.wiz3dprints.com}
      - MCP_SERVICE_TOKEN=${MCP_SERVICE_TOKEN}
      - BAMBU_MONITOR_URL=${BAMBU_MONITOR_URL:-http://bambu-monitor:8015}
    volumes:
      - ${UPLOADS_PATH:-./uploads}:/app/uploads
    networks:
      - wizqueue
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    container_name: wizqueue-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - wizqueue
    depends_on:
      - backend

  mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    container_name: wizqueue-mcp
    restart: unless-stopped
    ports:
      - "8014:8014"
    environment:
      - WIZ3DTOOLS_URL=${WIZ3DTOOLS_URL:-http://backend:3000}
      - MCP_SERVICE_TOKEN=${MCP_SERVICE_TOKEN}
    networks:
      - wizqueue
    depends_on:
      - backend

  bambu-monitor:
    build:
      context: ./bambu-monitor
      dockerfile: Dockerfile
    container_name: wizqueue-bambu-monitor
    restart: unless-stopped
    ports:
      - "8015:8015"
    environment:
      - WIZ3DTOOLS_URL=${WIZ3DTOOLS_URL:-http://backend:3000}
      - MCP_SERVICE_TOKEN=${MCP_SERVICE_TOKEN}
      - MONITOR_PORT=8015
      - CONFIG_RELOAD_S=${BAMBU_CONFIG_RELOAD_S:-300}
    networks:
      - wizqueue
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

networks:
  wizqueue:
    driver: bridge
