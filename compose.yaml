services:
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    container_name: wiz3dtools-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-minicpm-v:8b}
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10485760}
      - SMTP_HOST=${SMTP_HOST:-smtp.mail.me.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - COMPANY_NAME=${COMPANY_NAME:-Wiz3D Prints}
      - COMPANY_EMAIL=${COMPANY_EMAIL}
      - COMPANY_PHONE=${COMPANY_PHONE}
      - COMPANY_ADDRESS=${COMPANY_ADDRESS}
      - COMPANY_WEBSITE=${COMPANY_WEBSITE}
      - PAYMENT_PAYPAL=${PAYMENT_PAYPAL}
      - PAYMENT_VENMO=${PAYMENT_VENMO}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://tools.wiz3dprints.com}
      - MCP_SERVICE_TOKEN=${MCP_SERVICE_TOKEN}
      - BAMBU_MONITOR_URL=${BAMBU_MONITOR_URL:-http://bambu-monitor:8015}
      - STORE_API_KEY=${STORE_API_KEY}
      - STORE_IMAGE_PUBLIC_BASE=${STORE_IMAGE_PUBLIC_BASE:-https://tools.wiz3dprints.com/uploads/store}
      - MAX_IMAGE_SIZE=${MAX_IMAGE_SIZE:-5242880}
      - REMBG_URL=http://rembg:7000
    volumes:
      - ${UPLOADS_PATH:-./uploads}:/app/uploads
    networks:
      - wiz3dtools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - rembg

  rembg:
    image: danielgatis/rembg:latest
    container_name: wiz3dtools-rembg
    restart: unless-stopped
    command: ["s", "--host", "0.0.0.0", "--port", "7000", "--log_level", "warning"]
    volumes:
      - ${REMBG_MODELS_PATH:-./rembg-models}:/root/.u2net
    networks:
      - wiz3dtools

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    container_name: wiz3dtools-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ${UPLOADS_PATH:-./uploads}/store:/uploads/store:ro
    networks:
      - wiz3dtools
    depends_on:
      - backend

  mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    container_name: wiz3dtools-mcp
    restart: unless-stopped
    ports:
      - "8014:8014"
    environment:
      - WIZ3DTOOLS_URL=${WIZ3DTOOLS_URL:-http://backend:3000}
      - MCP_SERVICE_TOKEN=${MCP_SERVICE_TOKEN}
    networks:
      - wiz3dtools
    depends_on:
      - backend

  bambu-monitor:
    build:
      context: ./bambu-monitor
      dockerfile: Dockerfile
    container_name: wiz3dtools-bambu-monitor
    restart: unless-stopped
    ports:
      - "8015:8015"
    environment:
      - WIZ3DTOOLS_URL=${WIZ3DTOOLS_URL:-http://backend:3000}
      - MCP_SERVICE_TOKEN=${MCP_SERVICE_TOKEN}
      - MONITOR_PORT=8015
      - CONFIG_RELOAD_S=${BAMBU_CONFIG_RELOAD_S:-60}
    networks:
      - wiz3dtools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

networks:
  wiz3dtools:
    driver: bridge
